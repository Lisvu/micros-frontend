<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38b2ac;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="business1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="250" fill="url(#bg4)" rx="12" ry="12"/>

  <!-- Business elements -->
  <!-- Growth chart -->
  <polyline points="60,150 80,130 100,140 120,110 140,100 160,90" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="60" cy="150" r="4" fill="rgba(255,255,255,0.8)"/>
  <circle cx="80" cy="130" r="4" fill="rgba(255,255,255,0.8)"/>
  <circle cx="100" cy="140" r="4" fill="rgba(255,255,255,0.8)"/>
  <circle cx="120" cy="110" r="4" fill="rgba(255,255,255,0.8)"/>
  <circle cx="140" cy="100" r="4" fill="rgba(255,255,255,0.8)"/>
  <circle cx="160" cy="90" r="4" fill="rgba(255,255,255,0.8)"/>

  <!-- Dollar signs -->
  <text x="220" y="100" font-family="Arial, sans-serif" font-size="40" fill="rgba(255,255,255,0.7)">$</text>
  <text x="260" y="120" font-family="Arial, sans-serif" font-size="35" fill="rgba(255,255,255,0.6)">$</text>
  <text x="300" y="95" font-family="Arial, sans-serif" font-size="38" fill="rgba(255,255,255,0.8)">$</text>

  <!-- Briefcase -->
  <rect x="280" y="140" width="60" height="40" fill="rgba(255,255,255,0.8)" rx="4"/>
  <rect x="290" y="150" width="40" height="20" fill="rgba(139,69,19,0.9)" rx="2"/>
  <rect x="295" y="155" width="30" height="10" fill="rgba(255,255,255,0.9)" rx="1"/>
  <circle cx="305" cy="175" r="3" fill="rgba(139,69,19,0.9)"/>
  <circle cx="315" cy="175" r="3" fill="rgba(139,69,19,0.9)"/>

  <!-- Course title -->
  <text x="200" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">商业管理</text>
  <text x="200" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.8)">提升管理技能</text>

  <!-- Decorative elements -->
  <circle cx="40" cy="40" r="5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="360" cy="30" r="7" fill="rgba(255,255,255,0.3)"/>
</svg>